<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found - Mikolo Tshirts</title>
    <script src="https://kit.fontawesome.com/999358a4c6.js" crossorigin="anonymous"></script>
    <style>
      body {
        background: #f8f9fa;
        color: #333;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }
      #message {
        background: white;
        max-width: 400px;
        width: 100%;
        text-align: center;
        padding: 3rem 2rem;
        border-radius: 14px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }
      #message i {
        font-size: 3rem;
        color: #000035;
        margin-bottom: 1rem;
      }
      #message h2 {
        color: #000035;
        font-weight: bold;
        font-size: 3rem;
        margin: 0;
      }
      #message h1 {
        font-size: 1.2rem;
        font-weight: 600;
        color: #333;
        margin: 0.5rem 0 1rem;
      }
      #message p {
        line-height: 1.5;
        margin: 0 0 1.5rem;
        font-size: 0.95rem;
        color: #666;
      }
      #message a {
        display: inline-block;
        background: #000035;
        text-decoration: none;
        color: white;
        padding: 0.75rem 2rem;
        border-radius: 6px;
        font-weight: 600;
        transition: all 0.3s ease;
      }
      #message a:hover {
        background: #0a0040;
      }
    </style>
  </head>
  <body>
    <div id="message">
      <i class="fa-solid fa-shirt"></i>
      <h2>404</h2>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or may have moved.</p>
      <a href="/">Back to Shop</a>
    </div>
  </body>
</html>
