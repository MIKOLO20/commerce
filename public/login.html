<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Login - Mikolo Tshirts</title>
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
      <script src="https://kit.fontawesome.com/999358a4c6.js" crossorigin="anonymous"></script>
      <link rel="stylesheet" href="login.css">
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js"></script>

</head>
<style>
    .her{
    position: relative;
}
.her span{
     position: absolute;
        top: -4px;
        right: -2px;
        background-color:  #000035;

    margin-top: auto;

    background-color: #000035;
    color: white;

    text-decoration: none;

<body>
     <header class="bg-danger text-white text-center p-2 fw-bold">FREE SHIPPING ON ORDERS ABOVE 100K!</header>
    <nav class="d-flex justify-content-center align-items-center p-3 border-bottom shadow-sm position-sticky top-0 bg-white gap-3">
       <marquee behavior="scroll" direction="left"> <h2>MIKOLO.TSHIRTS.NG</h2></marquee>
       
     <div class="d-flex"> 
        <input type="email" name="" id="" placeholder="Search for products, brands and more" class="form-control w-50">
   <div class="but">
      <button class="btn text-white" type="submit"><i class="fa-solid fa-arrow-right"></i></button>
   </div>
     </div>
     <div class="d-flex fs-4 g-3 gap-4 ms-4">
        <i class="fa-solid fa-user"></i>
        <i class="fa-regular fa-heart her"><span>0</span></i>
        <i class="fa-regular fa-message"></i>
     </div>
    </nav>
    <div class="box text-white">
        <p>All Accessories</p>
        <p>Round Neck</p>
        <p>V-Neck</p>
        <p>Specials Offers</p>
        <p>Active wear</p>
        <p>Graphic Tees comming soon!</p>
    </div>
    <div class="login-box d-flex justify-content-center align-items-center flex-column mt-5">
        <h2 class="mb-4">Login to your account</h2>
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email">
                <div id="emailW"></div>
            </div>
            <label class="mb-2" for="password">Password</label>
                 <div class="input-group mb-3">
        <input type="password" class="form-control" id="password" placeholder="Enter your password">
        <span id="closed" class="input-group-text">
            <i class="bi bi-eye-slash" id="togglePassword" style="cursor: pointer;" onclick="showPassword()"></i>
        </span>
        <div class="passwordW"></div>
    </div>
            <div>
                <input type="checkbox" id="remember-me" >
                <label for="remember-me"> Remember me</label>
            </div>
            <button class="btn bb w-100 mt-1" id="login" type="button">Login</button>
            <div id="loginStatus" style="display:none;" class="mt-3 alert"></div>
        </form>
        <p class="mt-3">Don't have an account? <a href="signup.html">Sign up</a></p>

        <script>
            // Firebase Configuration
            const firebaseConfig = {
                apiKey: "AIzaSyDOP3Kss6Z0jHxzuHB7BM9jH_sR7JUhWrw",
                authDomain: "my-first-e-commerce-1e208.firebaseapp.com",
                projectId: "my-first-e-commerce-1e208",
                storageBucket: "my-first-e-commerce-1e208.firebasestorage.app",
                messagingSenderId: "237078006030",
                appId: "1:237078006030:web:29da579748cf04c37c2f5f",
                measurementId: "G-HXCLTNC0WQ"
            };

            // Initialize Firebase only once
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }

            const auth = firebase.auth();

            // Attach event listeners after DOM is ready
            function init() {
                const loginBtn = document.getElementById("login");
                if (loginBtn) {
                    loginBtn.addEventListener("click", handleLogin);
                }
            }

            function handleLogin(e) {
                e.preventDefault();
                let email = document.getElementById("email").value.trim();
                let password = document.getElementById("password").value;

                // Simple validation
                if (!email || !email.includes("@")) {
                    document.getElementById("emailW").innerHTML = '<p class="text-danger">Valid email required</p>';
                    return;
                }
                if (!password) {
                    document.querySelector(".passwordW").innerHTML = '<p class="text-danger">Password is required</p>';
                    return;
                }

                // Clear previous errors
                document.getElementById("emailW").innerHTML = "";
                document.querySelector(".passwordW").innerHTML = "";

                const loginBtn = document.getElementById("login");
                loginBtn.innerHTML = "Logging in...";
                loginBtn.disabled = true;

                // Sign in user
                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        const user = userCredential.user;

                        // Store user session
                        localStorage.setItem("currentUser", JSON.stringify({
                            uid: user.uid,
                            email: user.email,
                            displayName: user.displayName || email,
                            isLoggedIn: true
                        }));

                        // Show success and redirect
                        let statusDiv = document.getElementById("loginStatus");
                        statusDiv.className = "alert alert-success";
                        statusDiv.innerHTML = "Login successful! Redirecting...";
                        statusDiv.style.display = "block";

                        // Store remember me preference
                        if (document.getElementById("remember-me").checked) {
                            localStorage.setItem("rememberMe", JSON.stringify({
                                email: email,
                                uid: user.uid
                            }));
                        }

                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 1500);
                    })
                    .catch((error) => {
                        console.error("Login error:", error.code, error.message);
                        let statusDiv = document.getElementById("loginStatus");
                        statusDiv.className = "alert alert-danger";

                        let errorMsg = "An error occurred. Please try again.";
                        if (error.code === "auth/user-not-found") {
                            errorMsg = "No account found with this email.";
                        } else if (error.code === "auth/wrong-password") {
                            errorMsg = "Incorrect password.";
                        } else if (error.code === "auth/invalid-email") {
                            errorMsg = "Invalid email address.";
                        } else if (error.code === "auth/user-disabled") {
                            errorMsg = "This account has been disabled.";
                        }

                        statusDiv.innerHTML = `Error: ${errorMsg}`;
                        statusDiv.style.display = "block";

                        loginBtn.innerHTML = "Login";
                        loginBtn.disabled = false;
                    });
            }

            // Initialize when page loads
            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", init);
            } else {
                init();
            }
        </script>

        <script>
            const showPassword = () =>{
                document.getElementById("closed").innerHTML = `<i class="bi bi-eye" id="togglePassword" style="cursor: pointer;" onclick="hidePassword()"></i>`;
                document.getElementById("password").type = "text";
            }
            const hidePassword = () =>{
                document.getElementById("closed").innerHTML = `<i class="bi bi-eye-slash" id="togglePassword" style="cursor: pointer;" onclick="showPassword()"></i>`;
                document.getElementById("password").type = "password";
            }
        </script>
</body>
</html>
