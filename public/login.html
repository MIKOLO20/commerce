<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Login to your Mikolo Tshirts account">
    <title>Login - Mikolo Tshirts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://kit.fontawesome.com/999358a4c6.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./style.css">
    <!-- Firebase Standalone (Global Scope) -->
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-database-compat.js"></script>
</head>
<body>
    <header class="bg-danger text-white text-center p-2 fw-bold">FREE SHIPPING ON ORDERS ABOVE 100K!</header>

    <nav class="navbar auth-navbar navbar-light bg-white border-bottom shadow-sm">
        <div class="container-fluid px-3">
            <a class="navbar-brand fw-bold text-dark text-decoration-none" href="index.html">
                <i class="fa-solid fa-arrow-left me-2"></i>MIKOLO.TSHIRTS.NG
            </a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 class="auth-title">Welcome back</h2>
            <p class="auth-subtitle">Login to your account to continue shopping</p>

            <form id="loginForm" novalidate>
                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email">
                    <div id="emailW" class="field-error"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" placeholder="Enter your password">
                        <span class="input-group-text password-toggle" id="closed" onclick="showPassword()">
                            <i class="bi bi-eye-slash"></i>
                        </span>
                    </div>
                    <div id="passwordW" class="field-error"></div>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="remember-me">
                    <label class="form-check-label" for="remember-me">Remember me</label>
                </div>

                <button class="btn btn-brand w-100" id="login" type="button">Login</button>
                <div id="loginStatus" style="display:none;" class="mt-3 alert"></div>
            </form>

            <p class="auth-footer-link">Don't have an account? <a href="signup.html">Sign up</a></p>
        </div>
    </div>

    <script>
        // If already logged in, skip straight to the shop
        (function redirectIfLoggedIn() {
            const currentUser = localStorage.getItem("currentUser");
            if (currentUser) {
                try {
                    if (JSON.parse(currentUser).isLoggedIn) {
                        window.location.href = "index.html";
                    }
                } catch (e) {
                    localStorage.removeItem("currentUser");
                }
            }
        })();

        // Wait for Firebase to load
        function initializeApp() {
            if (typeof firebase === 'undefined') {
                console.warn("Firebase not loaded yet, retrying...");
                setTimeout(initializeApp, 500);
                return;
            }

            // Firebase Configuration
            const firebaseConfig = {
                apiKey: "AIzaSyDOP3Kss6Z0jHxzuHB7BM9jH_sR7JUhWrw",
                authDomain: "my-first-e-commerce-1e208.firebaseapp.com",
                projectId: "my-first-e-commerce-1e208",
                storageBucket: "my-first-e-commerce-1e208.firebasestorage.app",
                messagingSenderId: "237078006030",
                appId: "1:237078006030:web:29da579748cf04c37c2f5f",
                measurementId: "G-HXCLTNC0WQ"
            };

            // Initialize Firebase only once
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }

            const auth = firebase.auth();

            // Attach event listener
            const loginBtn = document.getElementById("login");
            if (loginBtn) {
                loginBtn.addEventListener("click", handleLogin);
            }

            function handleLogin(e) {
                e.preventDefault();
                let email = document.getElementById("email").value.trim();
                let password = document.getElementById("password").value;

                // Simple validation
                if (!email || !email.includes("@")) {
                    const el = document.getElementById("emailW");
                    if (el) el.textContent = "Valid email required";
                    return;
                }
                if (!password) {
                    const el = document.getElementById("passwordW");
                    if (el) el.textContent = "Password is required";
                    return;
                }

                // Clear previous errors
                const emailWEl = document.getElementById("emailW");
                const passwordWEl = document.getElementById("passwordW");
                if (emailWEl) emailWEl.textContent = "";
                if (passwordWEl) passwordWEl.textContent = "";

                const loginBtn = document.getElementById("login");
                loginBtn.innerHTML = "Logging in...";
                loginBtn.disabled = true;

                // Sign in user
                auth.signInWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        const user = userCredential.user;

                        // Store user session
                        localStorage.setItem("currentUser", JSON.stringify({
                            uid: user.uid,
                            email: user.email,
                            displayName: user.displayName || email,
                            isLoggedIn: true
                        }));

                        // Show success and redirect
                        let statusDiv = document.getElementById("loginStatus");
                        statusDiv.className = "alert alert-success";
                        statusDiv.innerHTML = "Login successful! Redirecting...";
                        statusDiv.style.display = "block";

                        // Store remember me preference
                        if (document.getElementById("remember-me").checked) {
                            localStorage.setItem("rememberMe", JSON.stringify({
                                email: email,
                                uid: user.uid
                            }));
                        }

                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 1500);
                    })
                    .catch((error) => {
                        console.error("Login error:", error.code, error.message);
                        let statusDiv = document.getElementById("loginStatus");
                        statusDiv.className = "alert alert-danger";

                        let errorMsg = "An error occurred. Please try again.";
                        if (error.code === "auth/user-not-found") {
                            errorMsg = "No account found with this email.";
                        } else if (error.code === "auth/wrong-password") {
                            errorMsg = "Incorrect password.";
                        } else if (error.code === "auth/invalid-email") {
                            errorMsg = "Invalid email address.";
                        } else if (error.code === "auth/user-disabled") {
                            errorMsg = "This account has been disabled.";
                        } else if (error.code === "auth/invalid-credential") {
                            errorMsg = "Incorrect email or password.";
                        }

                        statusDiv.innerHTML = `Error: ${errorMsg}`;
                        statusDiv.style.display = "block";

                        loginBtn.innerHTML = "Login";
                        loginBtn.disabled = false;
                    });
            }
        }

        // Initialize when page loads
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", initializeApp);
        } else {
            initializeApp();
        }
    </script>

    <script>
        const showPassword = () => {
            document.getElementById("closed").innerHTML = `<i class="bi bi-eye"></i>`;
            document.getElementById("closed").setAttribute("onclick", "hidePassword()");
            document.getElementById("password").type = "text";
        }
        const hidePassword = () => {
            document.getElementById("closed").innerHTML = `<i class="bi bi-eye-slash"></i>`;
            document.getElementById("closed").setAttribute("onclick", "showPassword()");
            document.getElementById("password").type = "password";
        }
    </script>
</body>
</html>
