<body>
     <header class="bg-danger text-white text-center p-2 fw-bold">FREE SHIPPING ON ORDERS ABOVE 100K!</header>

    <div class="box text-white">

    <div class="login-box d-flex justify-content-center align-items-center flex-column mt-5">
        <h2 class="mb-4">Sign Up for an Account</h2>
        <form id="signupForm">
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" placeholder="Enter your full name">
                <div id="nameW"></div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email">
                <div id="emailW"></div>
            </div>
            <label class="mb-2" for="password">Password</label>
                 <div class="input-group mb-3">
        <input type="password" class="form-control" id="password" placeholder="Enter your password">
        <span id="closed" class="input-group-text">
            <i class="bi bi-eye-slash" id="togglePassword" style="cursor: pointer;" onclick="showPassword()"></i>
        </span>
        <div class="passwordW"></div>
    </div>
    <label class="mb-2" for="passwordConfirm">Confirm Password</label>
               <div class="input-group mb-3">
        <input type="password" class="form-control" id="passwordConfirm" placeholder="Confirm your password">
        <span id="closed2" class="input-group-text">
            <i class="bi bi-eye-slash" id="togglePasswordConfirm" style="cursor: pointer;" onclick="showPasswordConfirm()"></i>
        </span>
        <div class="passwordConfirmW"></div>
    </div>
            <div>
               <div class="mb-3">
                <input type="checkbox" id="terms">
                <label for="terms"> I agree to the Terms and Conditions</label>
            </div>
            <button type="button" id="submit" class="btn bb w-100">Sign Up</button>
            <div id="signupStatus" style="display:none;" class="mt-3 alert"></div>
            </div>
            <div>
                <button id="google" type="button" class="btn bb w-100 mt-2 fw-bolder"> <span class="text-primary">G</span><span class="text-danger">o</span><span class="text-warning">o</span><span class="text-primary">g</span><span class="text-secondary">l</span><span class="text-danger">e</span></button>
            </div>
        </form>
        <p class="mt-3">Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-analytics.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-auth.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.6.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDOP3Kss6Z0jHxzuHB7BM9jH_sR7JUhWrw",
            authDomain: "my-first-e-commerce-1e208.firebaseapp.com",
            projectId: "my-first-e-commerce-1e208",
            storageBucket: "my-first-e-commerce-1e208.firebasestorage.app",
            messagingSenderId: "237078006030",
            appId: "1:237078006030:web:29da579748cf04c37c2f5f",
            measurementId: "G-HXCLTNC0WQ"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth();
        const provider = new GoogleAuthProvider();
        const db = getDatabase();
        console.log("Firebase initialized");

        // Validate form in real-time
        const validateForm = () => {
            const name = document.getElementById("name").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const passwordConfirm = document.getElementById("passwordConfirm").value;
            const terms = document.getElementById("terms").checked;

            const nameRegex = /^[A-Za-z\s]{3,}$/;
            const emailRegex = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\W).{4,}$/;

            const isValid = name && nameRegex.test(name) && 
                           email && emailRegex.test(email) && 
                           password && passwordRegex.test(password) && 
                           passwordConfirm === password && 
                           terms;
            
            document.getElementById("submit").disabled = !isValid;
        };

        // Add input listeners
        document.getElementById("name").addEventListener("input", validateForm);
        document.getElementById("email").addEventListener("input", validateForm);
        document.getElementById("password").addEventListener("input", validateForm);
        document.getElementById("passwordConfirm").addEventListener("input", validateForm);
        document.getElementById("terms").addEventListener("change", validateForm);

document.getElementById("submit").addEventListener("click", (e) => {
    e.preventDefault();
    let name = document.getElementById("name").value.trim();
    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;
    let passwordConfirm = document.getElementById("passwordConfirm").value;
    let terms = document.getElementById("terms").checked;

    let nameRegex = /^[A-Za-z\s]{3,}$/;
    let emailRegex = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/;
    let passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\W).{4,}$/;

    let nameTest = nameRegex.test(name);
    let emailTest = emailRegex.test(email);
    let passwordTest = passwordRegex.test(password);

    // Reset all error states
    document.getElementById("name").style.border = "";
    document.getElementById("email").style.border = "";
    document.getElementById("password").style.border = "";
    document.getElementById("passwordConfirm").style.border = "";
    document.getElementById("nameW").innerHTML = "";
    document.getElementById("emailW").innerHTML = "";
    document.getElementById("passwordW").innerHTML = "";
    document.getElementById("passwordConfirmW").innerHTML = "";

    let isValid = true;

    // Validation checks
    if (!name) {
        document.getElementById("name").style.border = "2px solid red";
        document.getElementById("nameW").innerHTML = '<p class="text-danger">Name is required</p>';
        isValid = false;
    } else if (!nameTest) {
        document.getElementById("name").style.border = "2px solid red";
        document.getElementById("nameW").innerHTML = '<p class="text-danger">Name must be at least 3 characters</p>';
        isValid = false;
    }

    if (!email) {
        document.getElementById("email").style.border = "2px solid red";
        document.getElementById("emailW").innerHTML = '<p class="text-danger">Email is required</p>';
        isValid = false;
    } else if (!emailTest) {
        document.getElementById("email").style.border = "2px solid red";
        document.getElementById("emailW").innerHTML = '<p class="text-danger">Email must be valid</p>';
        isValid = false;
    }

    if (!password) {
        document.getElementById("password").style.border = "2px solid red";
        document.getElementById("passwordW").innerHTML = '<p class="text-danger">Password is required</p>';
        isValid = false;
    } else if (!passwordTest) {
        document.getElementById("password").style.border = "2px solid red";
        document.getElementById("passwordW").innerHTML = '<p class="text-danger">Password must contain uppercase, lowercase, special character, and be 4+ characters</p>';
        isValid = false;
    }

    if (!passwordConfirm) {
        document.getElementById("passwordConfirm").style.border = "2px solid red";
        document.getElementById("passwordConfirmW").innerHTML = '<p class="text-danger">Please confirm your password</p>';
        isValid = false;
    } else if (password !== passwordConfirm) {
        document.getElementById("passwordConfirm").style.border = "2px solid red";
        document.getElementById("passwordConfirmW").innerHTML = '<p class="text-danger">Passwords do not match</p>';
        isValid = false;
    }

    if (!terms) {
        let statusDiv = document.getElementById("signupStatus");
        statusDiv.className = "mt-3 alert alert-warning";
        statusDiv.innerHTML = "You must agree to the Terms and Conditions";
        statusDiv.style.display = "block";
        isValid = false;
    }

    if (!isValid) return;

    // Show loading state
    let submitBtn = document.getElementById("submit");
    submitBtn.innerHTML = "Signing up...";
    submitBtn.disabled = true;

    createUserWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
            let uid = userCredential.user.uid;
            let userRef = ref(db, `users/${uid}`);
            set(userRef, {
                name: name,
                email: email,
                createdAt: new Date().toISOString()
            });

            // Store user session
            localStorage.setItem("currentUser", JSON.stringify({
                uid: userCredential.user.uid,
                email: userCredential.user.email,
                displayName: name,
                isLoggedIn: true
            }));

            // Success feedback
            let statusDiv = document.getElementById("signupStatus");
            statusDiv.className = "mt-3 alert alert-success";
            statusDiv.innerHTML = "Account created successfully! Redirecting home...";
            statusDiv.style.display = "block";

            setTimeout(() => {
                window.location.href = "index.html";
            }, 2000);
        })
        .catch((error) => {
            let statusDiv = document.getElementById("signupStatus");
            statusDiv.className = "mt-3 alert alert-danger";
            statusDiv.innerHTML = `Error: ${error.message}`;
            statusDiv.style.display = "block";
            
            submitBtn.innerHTML = "Sign Up";
            submitBtn.disabled = false;
        });
});

document.getElementById("google").addEventListener("click", () =>{
    let googleBtn = document.getElementById("google");
    googleBtn.innerHTML = "Signing with Google...";
    googleBtn.disabled = true;

    signInWithPopup(auth, provider)
      .then((result) => {
        // This gives you a Google Access Token.
        const credential = GoogleAuthProvider.credentialFromResult(result);
        const token = credential.accessToken;
        // The signed-in user info.
        const user = result.user;
        
        // Store user session
        localStorage.setItem("currentUser", JSON.stringify({
            uid: user.uid,
            email: user.email,
            displayName: user.displayName,
            isLoggedIn: true
        }));
        
        let statusDiv = document.getElementById("signupStatus");
        statusDiv.className = "mt-3 alert alert-success";
        statusDiv.innerHTML = "Google sign up successful! Redirecting...";
        statusDiv.style.display = "block";
        
        setTimeout(() => {
            window.location.replace("index.html");
        }, 1500);
      }).catch((error) => {
        let googleBtn = document.getElementById("google");
        googleBtn.innerHTML = '<span class="text-primary">G</span><span class="text-danger">o</span><span class="text-warning">o</span><span class="text-primary">g</span><span class="text-secondary">l</span><span class="text-danger">e</span>';
        googleBtn.disabled = false;
        
        let statusDiv = document.getElementById("signupStatus");
        statusDiv.className = "mt-3 alert alert-danger";
        statusDiv.innerHTML = `Error: ${error.message}`;
        statusDiv.style.display = "block";
      });
});
    </script>

    <script>
        const showPassword = () =>{
            document.getElementById("closed").innerHTML = `<i class="bi bi-eye" id="open" style="cursor: pointer;" onclick="hidePassword()"></i>`;
            document.getElementById("password").type = "text";
        }
        const hidePassword = () =>{
            document.getElementById("closed").innerHTML = `<i class="bi bi-eye-slash" id="closed" style="cursor: pointer;" onclick="showPassword()"></i>`;
            document.getElementById("password").type = "password";
        }
        const showPasswordConfirm = () =>{
             document.getElementById("closed2").innerHTML = `<i class="bi bi-eye" id="open" style="cursor: pointer;" onclick="hidePasswordConfirm()"></i>`;
            document.getElementById("passwordConfirm").type = "text";
        }
        const hidePasswordConfirm = () =>{
            document.getElementById("closed2").innerHTML = `<i class="bi bi-eye-slash" id="closed" style="cursor: pointer;" onclick="showPasswordConfirm()"></i>`;
            document.getElementById("passwordConfirm").type = "password";
        }
    </script></body>
