<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Create your Mikolo Tshirts account">
    <title>Sign Up - Mikolo Tshirts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <script src="https://kit.fontawesome.com/999358a4c6.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="./style.css">
    <!-- Firebase Standalone (Global Scope) -->
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.6.0/firebase-database-compat.js"></script>
</head>
<body>
    <header class="bg-danger text-white text-center p-2 fw-bold">FREE SHIPPING ON ORDERS ABOVE 100K!</header>

    <nav class="navbar auth-navbar navbar-light bg-white border-bottom shadow-sm">
        <div class="container-fluid px-3">
            <a class="navbar-brand fw-bold text-dark text-decoration-none" href="index.html">
                <i class="fa-solid fa-arrow-left me-2"></i>MIKOLO.TSHIRTS.NG
            </a>
        </div>
    </nav>

    <div class="auth-wrapper">
        <div class="auth-card">
            <h2 class="auth-title">Create your account</h2>
            <p class="auth-subtitle">Sign up to start shopping with Mikolo Tshirts</p>

            <form id="signupForm" novalidate>
                <div class="mb-3">
                    <label for="name" class="form-label">Full Name</label>
                    <input type="text" class="form-control" id="name" placeholder="Enter your full name">
                    <div id="nameW" class="field-error"></div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email address</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email">
                    <div id="emailW" class="field-error"></div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="password" placeholder="Enter your password">
                        <span class="input-group-text password-toggle" id="closed" onclick="showPassword()">
                            <i class="bi bi-eye-slash"></i>
                        </span>
                    </div>
                    <div id="passwordW" class="field-error"></div>
                </div>

                <div class="mb-3">
                    <label for="passwordConfirm" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <input type="password" class="form-control" id="passwordConfirm" placeholder="Confirm your password">
                        <span class="input-group-text password-toggle" id="closed2" onclick="showPasswordConfirm()">
                            <i class="bi bi-eye-slash"></i>
                        </span>
                    </div>
                    <div id="passwordConfirmW" class="field-error"></div>
                </div>

                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="terms">
                    <label class="form-check-label" for="terms">I agree to the Terms and Conditions</label>
                </div>

                <button type="button" id="submit" class="btn btn-brand w-100">Sign Up</button>
                <div id="signupStatus" style="display:none;" class="mt-3 alert"></div>

                <div class="auth-divider">or</div>

                <button id="google" type="button" class="btn btn-google w-100">
                    <i class="fa-brands fa-google me-2"></i>Continue with Google
                </button>
            </form>

            <p class="auth-footer-link">Already have an account? <a href="login.html">Login</a></p>
        </div>
    </div>

    <script>
        // If already logged in, skip straight to the shop
        (function redirectIfLoggedIn() {
            const currentUser = localStorage.getItem("currentUser");
            if (currentUser) {
                try {
                    if (JSON.parse(currentUser).isLoggedIn) {
                        window.location.href = "index.html";
                    }
                } catch (e) {
                    localStorage.removeItem("currentUser");
                }
            }
        })();

        // Wait for Firebase to load
        function initializeApp() {
            if (typeof firebase === 'undefined') {
                console.warn("Firebase not loaded yet, retrying...");
                setTimeout(initializeApp, 500);
                return;
            }

            // Firebase Configuration
            const firebaseConfig = {
                apiKey: "AIzaSyDOP3Kss6Z0jHxzuHB7BM9jH_sR7JUhWrw",
                authDomain: "my-first-e-commerce-1e208.firebaseapp.com",
                projectId: "my-first-e-commerce-1e208",
                storageBucket: "my-first-e-commerce-1e208.firebasestorage.app",
                messagingSenderId: "237078006030",
                appId: "1:237078006030:web:29da579748cf04c37c2f5f"
            };

            // Initialize Firebase only once
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }

            const auth = firebase.auth();
            const db = firebase.database();

            // Attach event listeners after Firebase is ready
            const submitBtn = document.getElementById("submit");
            const googleBtn = document.getElementById("google");

            if (submitBtn) {
                submitBtn.addEventListener("click", handleSignup);
            }
            if (googleBtn) {
                googleBtn.addEventListener("click", handleGoogleSignup);
            }

            function handleSignup() {
                const name = document.getElementById("name").value.trim();
                const email = document.getElementById("email").value.trim();
                const password = document.getElementById("password").value;
                const passwordConfirm = document.getElementById("passwordConfirm").value;
                const terms = document.getElementById("terms").checked;

                // Clear all previous errors first
                const errorElements = ["nameW", "emailW", "passwordW", "passwordConfirmW"];
                errorElements.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.textContent = "";
                });

                // Validation
                let hasError = false;

                if (!name || name.length < 3) {
                    const el = document.getElementById("nameW");
                    if (el) el.textContent = "Name must be at least 3 characters";
                    hasError = true;
                }
                if (!email || !email.includes("@")) {
                    const el = document.getElementById("emailW");
                    if (el) el.textContent = "Valid email required";
                    hasError = true;
                }
                if (!password || password.length < 6) {
                    const el = document.getElementById("passwordW");
                    if (el) el.textContent = "Password must be 6+ characters";
                    hasError = true;
                }
                if (password !== passwordConfirm) {
                    const el = document.getElementById("passwordConfirmW");
                    if (el) el.textContent = "Passwords don't match";
                    hasError = true;
                }
                if (!terms) {
                    alert("Please agree to Terms and Conditions");
                    return;
                }

                if (hasError) return;

                const submitBtn = document.getElementById("submit");
                if (!submitBtn) return;

                submitBtn.innerHTML = "Creating account...";
                submitBtn.disabled = true;

                // Create user
                auth.createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        // Store session
                        localStorage.setItem("currentUser", JSON.stringify({
                            uid: userCredential.user.uid,
                            email: userCredential.user.email,
                            displayName: name,
                            isLoggedIn: true
                        }));

                        // Show success and redirect
                        const statusDiv = document.getElementById("signupStatus");
                        if (statusDiv) {
                            statusDiv.className = "mt-3 alert alert-success";
                            statusDiv.textContent = "Account created! Redirecting...";
                            statusDiv.style.display = "block";
                        }

                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 1500);
                    })
                    .catch((error) => {
                        console.error("Signup error:", error.code, error.message);
                        const statusDiv = document.getElementById("signupStatus");

                        let errorMsg = error.message;
                        if (error.code === "auth/email-already-in-use") {
                            errorMsg = "An account with this email already exists.";
                        } else if (error.code === "auth/weak-password") {
                            errorMsg = "Password is too weak.";
                        } else if (error.code === "auth/invalid-email") {
                            errorMsg = "Invalid email address.";
                        }

                        if (statusDiv) {
                            statusDiv.className = "mt-3 alert alert-danger";
                            statusDiv.textContent = "Error: " + errorMsg;
                            statusDiv.style.display = "block";
                        }

                        submitBtn.innerHTML = "Sign Up";
                        submitBtn.disabled = false;
                    });
            }

            function handleGoogleSignup() {
                const provider = new firebase.auth.GoogleAuthProvider();
                const btn = document.getElementById("google");
                const originalHtml = btn.innerHTML;
                btn.innerHTML = "Signing in...";
                btn.disabled = true;

                auth.signInWithPopup(provider)
                    .then((result) => {
                        localStorage.setItem("currentUser", JSON.stringify({
                            uid: result.user.uid,
                            email: result.user.email,
                            displayName: result.user.displayName,
                            isLoggedIn: true
                        }));

                        const statusDiv = document.getElementById("signupStatus");
                        if (statusDiv) {
                            statusDiv.className = "mt-3 alert alert-success";
                            statusDiv.textContent = "Signed up successfully! Redirecting...";
                            statusDiv.style.display = "block";
                        }

                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 1500);
                    })
                    .catch((error) => {
                        console.error("Google signup error:", error.code, error.message);
                        const statusDiv = document.getElementById("signupStatus");

                        let errorMsg = error.message;
                        if (error.code === "auth/unauthorized-domain") {
                            errorMsg = "This domain isn't authorized for Google Sign-In yet.";
                        } else if (error.code === "auth/popup-closed-by-user") {
                            errorMsg = "Sign-in was cancelled.";
                        }

                        if (statusDiv) {
                            statusDiv.className = "mt-3 alert alert-danger";
                            statusDiv.textContent = "Error: " + errorMsg;
                            statusDiv.style.display = "block";
                        }

                        btn.innerHTML = originalHtml;
                        btn.disabled = false;
                    });
            }
        }

        // Initialize when document loads
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", initializeApp);
        } else {
            initializeApp();
        }
    </script>

    <script>
        const showPassword = () => {
            document.getElementById("closed").innerHTML = `<i class="bi bi-eye"></i>`;
            document.getElementById("closed").setAttribute("onclick", "hidePassword()");
            document.getElementById("password").type = "text";
        }
        const hidePassword = () => {
            document.getElementById("closed").innerHTML = `<i class="bi bi-eye-slash"></i>`;
            document.getElementById("closed").setAttribute("onclick", "showPassword()");
            document.getElementById("password").type = "password";
        }
        const showPasswordConfirm = () => {
            document.getElementById("closed2").innerHTML = `<i class="bi bi-eye"></i>`;
            document.getElementById("closed2").setAttribute("onclick", "hidePasswordConfirm()");
            document.getElementById("passwordConfirm").type = "text";
        }
        const hidePasswordConfirm = () => {
            document.getElementById("closed2").innerHTML = `<i class="bi bi-eye-slash"></i>`;
            document.getElementById("closed2").setAttribute("onclick", "showPasswordConfirm()");
            document.getElementById("passwordConfirm").type = "password";
        }
    </script>
</body>
</html>
