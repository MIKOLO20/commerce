<body>
     <header class="bg-danger text-white text-center p-2 fw-bold">FREE SHIPPING ON ORDERS ABOVE 100K!</header>
    <nav class="d-flex justify-content-center align-items-center p-3 border-bottom shadow-sm position-sticky top-0 bg-white gap-3">

     <div class="d-flex"> 
        <input type="email" name="" id="" placeholder="Search for products, brands and more" class="form-control w-50">
   <div class="but">

    <div class="box text-white">

    <div class="login-box d-flex justify-content-center align-items-center flex-column mt-5">
        <h2 class="mb-4">Sign Up for an Account</h2>
        <form id="signupForm">
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" placeholder="Enter your full name">
                <div id="nameW"></div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email">
                <div id="emailW"></div>
            </div>
            <label class="mb-2" for="password">Password</label>
                 <div class="input-group mb-3">
        <input type="password" class="form-control" id="password" placeholder="Enter your password">
        <span id="closed" class="input-group-text">
            <i class="bi bi-eye-slash" id="togglePassword" style="cursor: pointer;" onclick="showPassword()"></i>
        </span>
        <div id="passwordW"></div>
    </div>
    <label class="mb-2" for="passwordConfirm">Confirm Password</label>
               <div class="input-group mb-3">
        <input type="password" class="form-control" id="passwordConfirm" placeholder="Confirm your password">
        <span id="closed2" class="input-group-text">
            <i class="bi bi-eye-slash" id="togglePasswordConfirm" style="cursor: pointer;" onclick="showPasswordConfirm()"></i>
        </span>
        <div id="passwordConfirmW"></div>
    </div>
            <div>
               <div class="mb-3">
                <input type="checkbox" id="terms">
                <label for="terms"> I agree to the Terms and Conditions</label>
            </div>
            <button type="button" id="submit" class="btn bb w-100">Sign Up</button>
            <div id="signupStatus" style="display:none;" class="mt-3 alert"></div>
            </div>
            <!-- Google Sign-In disabled due to domain config - will enable later -->
        </form>
        <p class="mt-3">Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script>
        // Wait for Firebase to load
        function initializeApp() {
            if (typeof firebase === 'undefined') {
                console.warn("Firebase not loaded yet, retrying...");
                setTimeout(initializeApp, 500);
                return;
            }

            // Firebase Configuration
            const firebaseConfig = {
                apiKey: "AIzaSyDOP3Kss6Z0jHxzuHB7BM9jH_sR7JUhWrw",
                authDomain: "my-first-e-commerce-1e208.firebaseapp.com",
                projectId: "my-first-e-commerce-1e208",
                storageBucket: "my-first-e-commerce-1e208.firebasestorage.app",
                messagingSenderId: "237078006030",
                appId: "1:237078006030:web:29da579748cf04c37c2f5f"
            };

            // Initialize Firebase only once
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            
            const auth = firebase.auth();
            const db = firebase.database();
            console.log("✓ Firebase initialized successfully");

            // Attach event listeners after Firebase is ready
            const submitBtn = document.getElementById("submit");
            const googleBtn = document.getElementById("google");

            if (submitBtn) {
                submitBtn.addEventListener("click", handleSignup);
            }
            if (googleBtn) {
                googleBtn.addEventListener("click", handleGoogleSignup);
            }

            function handleSignup() {
                const name = document.getElementById("name").value.trim();
                const email = document.getElementById("email").value.trim();
                const password = document.getElementById("password").value;
                const passwordConfirm = document.getElementById("passwordConfirm").value;
                const terms = document.getElementById("terms").checked;

                // Clear all previous errors first
                const errorElements = ["nameW", "emailW", "passwordW", "passwordConfirmW"];
                errorElements.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.textContent = "";
                });

                // Validation
                let hasError = false;

                if (!name || name.length < 3) {
                    const el = document.getElementById("nameW");
                    if (el) el.textContent = "Name must be at least 3 characters";
                    hasError = true;
                }
                if (!email || !email.includes("@")) {
                    const el = document.getElementById("emailW");
                    if (el) el.textContent = "Valid email required";
                    hasError = true;
                }
                if (!password || password.length < 4) {
                    const el = document.getElementById("passwordW");
                    if (el) el.textContent = "Password must be 4+ characters";
                    hasError = true;
                }
                if (password !== passwordConfirm) {
                    const el = document.getElementById("passwordConfirmW");
                    if (el) el.textContent = "Passwords don't match";
                    hasError = true;
                }
                if (!terms) {
                    alert("Please agree to Terms and Conditions");
                    return;
                }

                if (hasError) return;

                const submitBtn = document.getElementById("submit");
                if (!submitBtn) return;

                submitBtn.innerHTML = "Creating account...";
                submitBtn.disabled = true;

                // Create user
                auth.createUserWithEmailAndPassword(email, password)
                    .then((userCredential) => {
                        console.log("✓ User created:", userCredential.user.uid);

                        // Store session
                        localStorage.setItem("currentUser", JSON.stringify({
                            uid: userCredential.user.uid,
                            email: userCredential.user.email,
                            displayName: name,
                            isLoggedIn: true
                        }));

                        // Show success and redirect
                        const statusDiv = document.getElementById("signupStatus");
                        if (statusDiv) {
                            statusDiv.className = "mt-3 alert alert-success";
                            statusDiv.textContent = "Account created! Redirecting...";
                            statusDiv.style.display = "block";
                        }

                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 1500);
                    })
                    .catch((error) => {
                        console.error("❌ Signup error:", error.code, error.message);
                        const statusDiv = document.getElementById("signupStatus");
                        if (statusDiv) {
                            statusDiv.className = "mt-3 alert alert-danger";
                            statusDiv.textContent = "Error: " + error.message;
                            statusDiv.style.display = "block";
                        }

                        submitBtn.innerHTML = "Sign Up";
                        submitBtn.disabled = false;
                    });
            }

            function handleGoogleSignup() {
                // Google Sign-In disabled due to domain not authorized in Firebase
                // User needs to add domain to Firebase Console > Authors. domains
                alert("Google Sign-In coming soon! Use email/password for now.");
            }
        }

        // Initialize when document loads
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", initializeApp);
        } else {
            initializeApp();
        }
    </script>

    <script>
        const showPassword = () =>{
            document.getElementById("closed").innerHTML = `<i class="bi bi-eye" id="open" style="cursor: pointer;" onclick="hidePassword()"></i>`;
            document.getElementById("password").type = "text";
        }
        const hidePassword = () =>{
            document.getElementById("closed").innerHTML = `<i class="bi bi-eye-slash" id="closed" style="cursor: pointer;" onclick="showPassword()"></i>`;
            document.getElementById("password").type = "password";
        }
        const showPasswordConfirm = () =>{
             document.getElementById("closed2").innerHTML = `<i class="bi bi-eye" id="open" style="cursor: pointer;" onclick="hidePasswordConfirm()"></i>`;
            document.getElementById("passwordConfirm").type = "text";
        }
        const hidePasswordConfirm = () =>{
            document.getElementById("closed2").innerHTML = `<i class="bi bi-eye-slash" id="closed" style="cursor: pointer;" onclick="showPasswordConfirm()"></i>`;
            document.getElementById("passwordConfirm").type = "password";
        }
    </script></body>
