<body>

    <div class="login-box d-flex justify-content-center align-items-center flex-column mt-5">
        <h2 class="mb-4">Sign Up for an Account</h2>
        <form id="signupForm">
            <div class="mb-3">
                <label for="name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="name" placeholder="Enter your full name">
                <div id="nameW"></div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" placeholder="Enter your email">
                <div id="emailW"></div>
            </div>
            <label class="mb-2" for="password">Password</label>
                 <div class="input-group mb-3">
        <input type="password" class="form-control" id="password" placeholder="Enter your password">
        <span id="closed" class="input-group-text">
            <i class="bi bi-eye-slash" id="togglePassword" style="cursor: pointer;" onclick="showPassword()"></i>
        </span>
        <div class="passwordW"></div>
    </div>
    <label class="mb-2" for="passwordConfirm">Confirm Password</label>
               <div class="input-group mb-3">
        <input type="password" class="form-control" id="passwordConfirm" placeholder="Confirm your password">
        <span id="closed2" class="input-group-text">
            <i class="bi bi-eye-slash" id="togglePasswordConfirm" style="cursor: pointer;" onclick="showPasswordConfirm()"></i>
        </span>
        <div class="passwordConfirmW"></div>
    </div>
            <div>
               <div class="mb-3">
                <input type="checkbox" id="terms">
                <label for="terms"> I agree to the Terms and Conditions</label>
            </div>
            <button type="button" id="submit" class="btn bb w-100">Sign Up</button>
            <div id="signupStatus" style="display:none;" class="mt-3 alert"></div>
            </div>
            <div>
                <button id="google" type="button" class="btn bb w-100 mt-2 fw-bolder"> <span class="text-primary">G</span><span class="text-danger">o</span><span class="text-warning">o</span><span class="text-primary">g</span><span class="text-secondary">l</span><span class="text-danger">e</span></button>
            </div>
        </form>
        <p class="mt-3">Already have an account? <a href="login.html">Login</a></p>
    </div>

    <script>
        // Initialize Firebase
        console.log("Script started - checking firebase...", typeof firebase);
        
        if (typeof firebase === 'undefined') {
            console.error("Firebase library not loaded!");
            alert("Firebase not loaded - page may not have loaded properly. Try refreshing.");
        }

        const firebaseConfig = {
            apiKey: "AIzaSyDOP3Kss6Z0jHxzuHB7BM9jH_sR7JUhWrw",
            authDomain: "my-first-e-commerce-1e208.firebaseapp.com",
            projectId: "my-first-e-commerce-1e208",
            storageBucket: "my-first-e-commerce-1e208.firebasestorage.app",
            messagingSenderId: "237078006030",
            appId: "1:237078006030:web:29da579748cf04c37c2f5f"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            console.log("Firebase initialized successfully");
        } catch (e) {
            console.error("Firebase initialization error:", e);
        }

        const auth = firebase.auth();
        const db = firebase.database();

        console.log("Auth available:", !!auth, "DB available:", !!db);

        // Toggle password visibility
        function showPassword() {
            const pwd = document.getElementById("password");
            pwd.type = pwd.type === "password" ? "text" : "password";
        }

        function showPasswordConfirm() {
            const pwd = document.getElementById("passwordConfirm");
            pwd.type = pwd.type === "password" ? "text" : "password";
        }

        // Wait for DOM to be ready
        function attachEventListeners() {
            const submitBtn = document.getElementById("submit");
            const googleBtn = document.getElementById("google");

            if (!submitBtn) {
                console.error("Submit button not found in DOM");
                return;
            }
            if (!googleBtn) {
                console.error("Google button not found in DOM");
                return;
            }

            console.log("Attaching event listeners to buttons...");

            // Handle Sign Up
            submitBtn.addEventListener("click", function() {
                const name = document.getElementById("name").value.trim();
                const email = document.getElementById("email").value.trim();
                const password = document.getElementById("password").value;
                const passwordConfirm = document.getElementById("passwordConfirm").value;
                const terms = document.getElementById("terms").checked;

                console.log("Sign up button clicked - name:", name, "email:", email);

                // Validation
                let errors = [];
                if (!name || name.length < 3) errors.push("nameW", "Name must be at least 3 characters");
                if (!email || !email.includes("@")) errors.push("emailW", "Valid email required");
                if (!password || password.length < 4) errors.push("passwordW", "Password must be 4+ characters");
                if (password !== passwordConfirm) errors.push("passwordConfirmW", "Passwords don't match");
                if (!terms) {
                    alert("Please agree to Terms and Conditions");
                    return;
                }

                // Show errors
                document.getElementById("nameW").textContent = "";
                document.getElementById("emailW").textContent = "";
                document.getElementById("passwordW").textContent = "";
                document.getElementById("passwordConfirmW").textContent = "";

                for (let i = 0; i < errors.length; i += 2) {
                    document.getElementById(errors[i]).textContent = errors[i+1];
                }

                if (errors.length > 0) return;

                // Create account
                const btn = this;
                btn.innerHTML = "Creating account...";
                btn.disabled = true;

                console.log("Calling createUserWithEmailAndPassword...");
                auth.createUserWithEmailAndPassword(email, password)
                    .then(userCredential => {
                        console.log("User created:", userCredential.user.uid);
                        
                        // Save to database
                        db.ref("users/" + userCredential.user.uid).set({
                            name: name,
                            email: email,
                            createdAt: new Date().toISOString()
                        });

                        // Store session
                        localStorage.setItem("currentUser", JSON.stringify({
                            uid: userCredential.user.uid,
                            email: userCredential.user.email,
                            displayName: name,
                            isLoggedIn: true
                        }));

                        const statusDiv = document.getElementById("signupStatus");
                        statusDiv.className = "mt-3 alert alert-success";
                        statusDiv.textContent = "Account created! Redirecting...";
                        statusDiv.style.display = "block";

                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 1500);
                    })
                    .catch(error => {
                        console.error("Firebase error:", error.code, error.message);
                        const statusDiv = document.getElementById("signupStatus");
                        statusDiv.className = "mt-3 alert alert-danger";
                        statusDiv.textContent = "Error: " + error.message;
                        statusDiv.style.display = "block";

                        btn.innerHTML = "Sign Up";
                        btn.disabled = false;
                    });
            });

            // Handle Google Sign Up
            googleBtn.addEventListener("click", function() {
                console.log("Google button clicked");
                const provider = new firebase.auth.GoogleAuthProvider();
                const btn = this;
                btn.innerHTML = "Signing in...";
                btn.disabled = true;

                console.log("Calling signInWithPopup...");
                auth.signInWithPopup(provider)
                    .then(result => {
                        console.log("Google sign up success");
                        localStorage.setItem("currentUser", JSON.stringify({
                            uid: result.user.uid,
                            email: result.user.email,
                            displayName: result.user.displayName,
                            isLoggedIn: true
                        }));

                        const statusDiv = document.getElementById("signupStatus");
                        statusDiv.className = "mt-3 alert alert-success";
                        statusDiv.textContent = "Signed up successfully! Redirecting...";
                        statusDiv.style.display = "block";

                        setTimeout(() => {
                            window.location.href = "index.html";
                        }, 1500);
                    })
                    .catch(error => {
                        console.error("Google sign up error:", error.code, error.message);
                        const statusDiv = document.getElementById("signupStatus");
                        statusDiv.className = "mt-3 alert alert-danger";
                        statusDiv.textContent = "Error: " + error.message;
                        statusDiv.style.display = "block";

                        btn.innerHTML = '<span class="text-primary">G</span><span class="text-danger">o</span><span class="text-warning">o</span><span class="text-primary">g</span><span class="text-secondary">l</span><span class="text-danger">e</span>';
                        btn.disabled = false;
                    });
            });

            console.log("Event listeners attached successfully");
        }

        // Attach listeners when DOM is ready
        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", attachEventListeners);
        } else {
            attachEventListeners();
        }
                    statusDiv.textContent = "Google sign up successful! Redirecting...";
                    statusDiv.style.display = "block";

                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1500);
                })
                .catch(error => {
                    console.log("Google error:", error.message);
                    btn.innerHTML = '<span class="text-primary">G</span><span class="text-danger">o</span><span class="text-warning">o</span><span class="text-primary">g</span><span class="text-secondary">l</span><span class="text-danger">e</span>';
                    btn.disabled = false;

                    const statusDiv = document.getElementById("signupStatus");
                    statusDiv.className = "mt-3 alert alert-danger";
                    statusDiv.textContent = "Error: " + error.message;
                    statusDiv.style.display = "block";
                });
        });
    </script>

    <script>
        const showPassword = () =>{
            document.getElementById("closed").innerHTML = `<i class="bi bi-eye" id="open" style="cursor: pointer;" onclick="hidePassword()"></i>`;
            document.getElementById("password").type = "text";
        }
        const hidePassword = () =>{
            document.getElementById("closed").innerHTML = `<i class="bi bi-eye-slash" id="closed" style="cursor: pointer;" onclick="showPassword()"></i>`;
            document.getElementById("password").type = "password";
        }
        const showPasswordConfirm = () =>{
             document.getElementById("closed2").innerHTML = `<i class="bi bi-eye" id="open" style="cursor: pointer;" onclick="hidePasswordConfirm()"></i>`;
            document.getElementById("passwordConfirm").type = "text";
        }
        const hidePasswordConfirm = () =>{
            document.getElementById("closed2").innerHTML = `<i class="bi bi-eye-slash" id="closed" style="cursor: pointer;" onclick="showPasswordConfirm()"></i>`;
            document.getElementById("passwordConfirm").type = "password";
        }
    </script></body>
